plugins {
    // This is the brand new 26.1 plugin
    id 'net.fabricmc.loom' version '1.15-SNAPSHOT' 
}

version = "1.0.0"
group = "net.trafficlunar.optionsprofiles"

dependencies {
    // 26.1 is now officially supported!
    minecraft "com.mojang:minecraft:26.1"
    mappings loom.officialMojangMappings() 
    
    // We use 'implementation' now, not 'modImplementation' for 26.1
    implementation "net.fabricmc:fabric-loader:0.18.4"
}

// 26.1 REQUIRES Java 25
java {
    toolchain.languageVersion = JavaLanguageVersion.of(25)
}
