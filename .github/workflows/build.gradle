plugins {
    // Loom 1.15 is the only one that supports 26.1 properly right now
    id 'net.fabricmc.loom' version '1.15-SNAPSHOT' 
}

version = "1.0.0"
group = "net.trafficlunar.optionsprofiles"

dependencies {
    // Official 26.1 Tiny Takeover release
    minecraft "com.mojang:minecraft:26.1"
    
    // 26.1 uses Official Mojang Mappings by default!
    mappings loom.officialMojangMappings() 
    
    // Use the absolutely latest loader for 26.1
    modImplementation "net.fabricmc:fabric-loader:0.18.9"
}

// Java 25 is MANDATORY for 26.1
java {
    toolchain.languageVersion = JavaLanguageVersion.of(25)
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 25
}
