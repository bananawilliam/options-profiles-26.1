plugins {
    // Note: The ID is now just 'net.fabricmc.loom'
    id 'net.fabricmc.loom' version '1.15-SNAPSHOT'
}

version = "1.0.0"
group = "net.trafficlunar.optionsprofiles"

dependencies {
    // 26.1 Tiny Takeover official release
    minecraft "com.mojang:minecraft:26.1"
    
    // NO 'mappings' line is needed! 26.1 is unobfuscated.
    
    modImplementation "net.fabricmc:fabric-loader:0.18.9"
}

java {
    // Java 25 is required for 2026 versions
    toolchain.languageVersion = JavaLanguageVersion.of(25)
}
