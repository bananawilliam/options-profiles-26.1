plugins {
    // This is the new plugin ID for Minecraft 26.x+
    id 'net.fabricmc.fabric-loom' version '1.15-SNAPSHOT'
}

version = "1.0.0"
group = "net.trafficlunar.optionsprofiles"

dependencies {
    // 26.1 Tiny Takeover
    minecraft "com.mojang:minecraft:26.1"
    
    // We don't need 'mappings' anymore because 26.1 is unobfuscated!
    // But we still need the loader.
    modImplementation "net.fabricmc:fabric-loader:0.18.9"
}

java {
    // Java 25 is required for 26.1
    toolchain.languageVersion = JavaLanguageVersion.of(25)
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 25
}
